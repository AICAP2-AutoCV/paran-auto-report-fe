<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M8 12h8M8 8h8M8 16h4"/>
      </svg>
    </div>
    Report AI
  </div>

  <div class="topbar-right">
    <div class="api-badge" id="apiBadge">
      <div class="api-dot loading" id="apiDot"></div>
      <span id="apiLabel">localhost:8000</span>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
        <path d="M1 1l4 4 4-4" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <button class="profile-btn" id="profileBtn" title="내 정보 설정">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
  </div>

  <div class="api-popover" id="apiPopover">
    <label>API 서버 주소</label>
    <input class="api-url-input" id="apiUrlInput" value="http://localhost:8000"
           placeholder="http://localhost:8000" />
  </div>
</div>

<!-- ── Chat ───────────────────────────────────────────────────────── -->
<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="chips" id="chips">
      <span class="chip">이번 주 업무 요약</span>
      <span class="chip">최근 2주 성과 보고서</span>
      <span class="chip">이번 달 주요 활동 정리</span>
      <span class="chip">지난주 업무 현황</span>
    </div>
    <div class="input-wrap">
      <input class="chat-input" id="chatInput"
             placeholder="보고서 주제를 자유롭게 입력하세요 (예: 이번 주 업무 요약해줘)" />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Preview modal ──────────────────────────────────────────────── -->
<div class="overlay" id="previewOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>보고서 미리보기</h2>
      <button class="modal-close" id="previewClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="md" id="previewBody"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="previewCloseBtn">닫기</button>
      <select class="f-select f-sm" id="previewFmt" style="width:130px;">
        <option value="docx">Word (.docx)</option>
        <option value="pdf">PDF</option>
      </select>
      <button class="btn primary" id="previewDlBtn" style="padding:0 16px;">다운로드</button>
    </div>
  </div>
</div>

<!-- ── Profile / Onboarding modal ────────────────────────────────── -->
<div class="overlay" id="profileOverlay">
  <div class="modal modal-sm">
    <div class="modal-head">
      <h2 id="profileModalTitle">내 정보 입력</h2>
      <button class="modal-close" id="profileClose">✕</button>
    </div>
    <div class="modal-body">
      <p class="profile-hint" id="profileHint">보고서 상단 표에 자동으로 반영될 정보를 입력해 주세요.</p>
      <div class="profile-form">
        <label>팀명</label>
        <input class="f-input" id="pTeam" placeholder="예: 파란팀" />
        <label>학과</label>
        <input class="f-input" id="pDept" placeholder="예: 컴퓨터공학과" />
        <label>학번</label>
        <input class="f-input" id="pStudentId" placeholder="예: 202012345" />
        <label>성명</label>
        <input class="f-input" id="pName" placeholder="예: 홍길동" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="profileSkip">나중에</button>
      <button class="btn primary" id="profileSave">저장</button>
    </div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
