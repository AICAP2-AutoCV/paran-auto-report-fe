<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파RAG학기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="style.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M8 12h8M8 8h8M8 16h4"/>
      </svg>
    </div>
    파RAG학기
  </div>

  <div class="topbar-right">
    <button class="profile-btn" id="profileBtn" title="내 정보 설정">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
  </div>

</div>

<!-- ── Chat ───────────────────────────────────────────────────────── -->
<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="chips" id="chips">
      <span class="chip">📅 이번 주 활동 요약</span>
      <span class="chip">📋 이번 달 프로젝트 진행 정리</span>
      <span class="chip">💻 지난 주 개발 내용 정리</span>
    </div>
    <div class="input-wrap">
      <input class="chat-input" id="chatInput"
             placeholder="보고서 주제를 자유롭게 입력하세요 (예: 이번 주 업무 요약해줘)" />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Preview modal ──────────────────────────────────────────────── -->
<div class="overlay" id="previewOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>보고서 미리보기</h2>
      <button class="modal-close" id="previewClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="md" id="previewBody"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="previewCloseBtn">닫기</button>
      <button class="btn-ghost" id="previewFileBtn">파일 미리보기</button>
      <select class="f-select f-sm" id="previewFmt" style="width:130px;">
        <option value="docx">Word (.docx)</option>
        <option value="pdf">PDF</option>
      </select>
      <button class="btn primary" id="previewDlBtn">다운로드</button>
    </div>
  </div>
</div>

<!-- ── PDF preview modal ─────────────────────────────────────────── -->
<div class="overlay" id="pdfOverlay">
  <div class="modal modal-pdf">
    <div class="modal-head">
      <h2>실제 파일 미리보기</h2>
      <button class="modal-close" id="pdfClose">✕</button>
    </div>
    <div class="modal-body pdf-body">
      <div class="pdf-loading" id="pdfLoading">
        <div class="spin" style="width:28px;height:28px;border-width:3px;"></div>
        <span>파일 생성 중...</span>
      </div>
      <iframe id="pdfFrame" style="display:none;width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="pdfCloseBtn">닫기</button>
    </div>
  </div>
</div>

<!-- ── AI Consent modal ───────────────────────────────────────────── -->
<div class="overlay" id="consentOverlay">
  <div class="modal modal-sm">
    <div class="modal-head">
      <h2>다운로드 전 확인</h2>
      <button class="modal-close" id="consentClose">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">
        아래 두 항목을 모두 확인해야 다운로드할 수 있습니다.
      </p>
      <label class="consent-label">
        <input type="checkbox" id="consentAI" />
        <span>이 보고서는 <strong>AI가 생성</strong>한 것임을 확인했습니다.</span>
      </label>
      <label class="consent-label">
        <input type="checkbox" id="consentUse" />
        <span>이 보고서를 <strong>그대로 사용하지 않고</strong> 응용·수정하여 활용하겠습니다.</span>
      </label>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="consentCancel">취소</button>
      <button class="btn primary" id="consentOk" disabled>다운로드</button>
    </div>
  </div>
</div>

<!-- ── Profile / Onboarding modal ────────────────────────────────── -->
<div class="overlay" id="profileOverlay">
  <div class="modal modal-sm">
    <div class="modal-head">
      <h2 id="profileModalTitle">내 정보 입력</h2>
      <button class="modal-close" id="profileClose">✕</button>
    </div>
    <div class="modal-body">
      <p class="profile-hint" id="profileHint">보고서 상단 표에 자동으로 반영될 정보를 입력해 주세요.</p>
      <div class="profile-form">
        <label>팀명</label>
        <input class="f-input" id="pTeam" placeholder="예: 파란팀" />
        <label>학과</label>
        <input class="f-input" id="pDept" placeholder="예: 컴퓨터공학과" />
        <label>학번</label>
        <input class="f-input" id="pStudentId" placeholder="예: 202012345" />
        <label>성명</label>
        <input class="f-input" id="pName" placeholder="예: 홍길동" />
        <label>내 역할</label>
        <input class="f-input" id="pRole" placeholder="예: 백엔드 개발, 데이터 분석" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="profileSkip">나중에</button>
      <button class="btn primary" id="profileSave">저장</button>
    </div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
